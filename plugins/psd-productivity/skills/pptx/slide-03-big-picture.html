<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #EEEBE4;
  display: flex; flex-direction: column;
  font-family: Arial, sans-serif;
}
.header {
  background: #25424C;
  padding: 14pt 40pt;
  border-bottom: 6pt solid #6CA18A;
}
h1 {
  color: #FFFAEC;
  font-size: 34pt;
  margin: 0;
  font-weight: bold;
}
.content {
  padding: 18pt 50pt 105pt 50pt;
}
.stat-box {
  background: #ffffff;
  padding: 11pt;
  margin: 7pt 0;
  border-left: 8pt solid #6CA18A;
  border-radius: 4pt;
}
.stat-number {
  color: #6CA18A;
  font-size: 24pt;
  font-weight: bold;
  margin: 0;
}
.stat-label {
  color: #25424C;
  font-size: 13pt;
  margin: 5pt 0 0 0;
}
</style>
</head>
<body>
<div class="header">
  <h1>November 2025: Historic Month</h1>
</div>
<div class="content">
  <div class="stat-box">
    <p class="stat-number">$100B+</p>
    <p class="stat-label">Infrastructure investments</p>
  </div>
  <div class="stat-box">
    <p class="stat-number">3 Releases</p>
    <p class="stat-label">Claude 4.5, GPT-5.1, Gemini 3</p>
  </div>
  <div class="stat-box">
    <p class="stat-number">67-83%</p>
    <p class="stat-label">Cost reduction</p>
  </div>
</div>
</body>
</html>
