<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #EEEBE4;
  display: flex; flex-direction: column;
  font-family: Arial, sans-serif;
}
.header {
  background: #25424C;
  padding: 15pt 40pt;
  border-bottom: 6pt solid #6CA18A;
}
h1 {
  color: #FFFAEC;
  font-size: 36pt;
  margin: 0;
  font-weight: bold;
}
.content {
  flex: 1;
  padding: 15pt 50pt;
  display: flex;
  gap: 30pt;
}
.text-side {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.image-side {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}
.big-stat {
  color: #6CA18A;
  font-size: 64pt;
  font-weight: bold;
  margin: 0 0 15pt 0;
}
.stat-label {
  color: #25424C;
  font-size: 22pt;
  margin: 0 0 15pt 0;
  line-height: 1.4;
}
.insight {
  background: #ffffff;
  padding-bottom: 80pt;
  border-left: 6pt solid #346780;
  margin-top: 20pt;
}
.insight-text {
  color: #25424C;
  font-size: 16pt;
  margin: 0;
  font-style: italic;
}
</style>
</head>
<body>
<div class="header">
  <h1>Enterprise Adoption Surge</h1>
</div>
<div class="content">
  <div class="text-side">
    <p class="big-stat">78%</p>
    <p class="stat-label">of organizations now using AI<br>(up from 55% in 2023)</p>
    <p class="big-stat">$3.70</p>
    <p class="stat-label">ROI per dollar invested</p>
    <div class="insight">
      <p class="insight-text">Organizations with formal AI strategy: 80% success rate vs 37% without</p>
    </div>
  </div>
  <div class="image-side">
    <img src="enterprise-stats.png" style="max-width: 100%; max-height: 100%; object-fit: contain;">
  </div>
</div>
</body>
</html>
