<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #EEEBE4;
  display: flex; flex-direction: column;
  font-family: Arial, sans-serif;
}
.header {
  background: #25424C;
  padding: 15pt 40pt;
  border-bottom: 6pt solid #6CA18A;
}
h1 {
  color: #FFFAEC;
  font-size: 36pt;
  margin: 0;
  font-weight: bold;
}
.content {
  flex: 1;
  padding: 15pt 50pt;
  display: flex;
  gap: 30pt;
}
.text-side {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.image-side {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}
.big-number {
  color: #6CA18A;
  font-size: 72pt;
  font-weight: bold;
  margin: 0;
  line-height: 1;
}
.label {
  color: #25424C;
  font-size: 24pt;
  margin: 10pt 0 40pt 0;
}
.point {
  color: #25424C;
  font-size: 18pt;
  margin: 0 0 15pt 0;
  line-height: 1.5;
}
.point::before {
  content: "→ ";
  color: #6CA18A;
  font-weight: bold;
}
</style>
</head>
<body>
<div class="header">
  <h1>AI is Becoming Accessible</h1>
</div>
<div class="content">
  <div class="text-side">
    <p class="big-number">67-83%</p>
    <p class="label">Cost Reduction</p>
    <p class="point">Open-source models (Meta Llama) available free</p>
    <p class="point">No longer requires enterprise-scale budgets</p>
    <p class="point">All organization sizes can benefit</p>
    <p class="point">Hardware costs declining 30% annually</p>
  </div>
  <div class="image-side">
    <img src="cost-reduction.png" style="max-width: 100%; max-height: 100%; object-fit: contain;">
  </div>
</div>
</body>
</html>
