<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #25424C;
  display: flex; flex-direction: column;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
}
.container {
  text-align: center;
  padding-bottom: 80pt;
}
h1 {
  color: #6CA18A;
  font-size: 44pt;
  margin: 0 0 15pt 0;
  font-weight: bold;
}
.quote {
  color: #FFFAEC;
  font-size: 24pt;
  margin: 0 0 20pt 0;
  line-height: 1.6;
  max-width: 600pt;
}
.attribution {
  color: #D7CDBE;
  font-size: 16pt;
  margin: 0 0 50pt 0;
  font-style: italic;
}
.cta {
  background: #6CA18A;
  color: #ffffff;
  font-size: 20pt;
  padding: 18pt 35pt;
  border-radius: 6pt;
  display: inline-block;
  font-weight: bold;
  margin-top: 20pt;
}
</style>
</head>
<body>
<div class="container">
  <h1>The AI Inflection Point</h1>
  <p class="quote">"The question is no longer 'Should we explore AI?' but rather 'How quickly can we thoughtfully integrate AI to improve operations and serve stakeholders?'"</p>
  <p class="attribution">—From the research</p>
  <div class="cta">
    <p style="margin: 0;">Let's discuss next steps</p>
  </div>
</div>
</body>
</html>
